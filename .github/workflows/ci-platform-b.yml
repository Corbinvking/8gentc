name: CI — Platform B (Contractor)

on:
  pull_request:
    paths:
      - "apps/contractor/**"
      - "packages/shared/**"
      - "packages/ui/**"
      - "packages/db/**"
      - "packages/api-client/**"

concurrency:
  group: ci-platform-b-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck --filter=@8gent/contractor...
      - run: pnpm run lint --filter=@8gent/contractor...
      - run: pnpm run build --filter=@8gent/contractor...
      - run: pnpm run test --filter=@8gent/contractor...
