name: Deploy

on:
  push:
    branches:
      - main
      - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel a deploy in progress

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/8gent

jobs:
  detect-changes:
    name: Detect Changed Platforms
    runs-on: ubuntu-latest
    outputs:
      platform-a: ${{ steps.changes.outputs.platform-a }}
      platform-b: ${{ steps.changes.outputs.platform-b }}
      platform-c: ${{ steps.changes.outputs.platform-c }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            platform-a:
              - 'apps/consumer/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
              - 'packages/db/**'
            platform-b:
              - 'apps/contractor/**'
              - 'packages/shared/**'
              - 'packages/ui/**'
              - 'packages/db/**'
            platform-c:
              - 'services/**'
              - 'packages/8gentc/**'
              - 'packages/swarm/**'
              - 'packages/shared/**'
              - 'packages/db/**'

  deploy-consumer:
    name: Deploy Platform A (Consumer)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.platform-a == 'true'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=consumer...
      # Deploy to Vercel
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_CONSUMER }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          working-directory: apps/consumer

  deploy-contractor:
    name: Deploy Platform B (Contractor)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.platform-b == 'true'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build --filter=contractor...
      # Deploy to Vercel
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_CONTRACTOR }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          working-directory: apps/contractor

  deploy-engine:
    name: Deploy Platform C (Engine Services)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.platform-c == 'true'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push engine service
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/engine/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push LLM gateway
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/llm-gateway/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/llm-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push agent host
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/agent-host/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/agent-host:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy to DigitalOcean via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ github.ref == 'refs/heads/main' && secrets.DO_HOST_PROD || secrets.DO_HOST_STAGING }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/8gent
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [deploy-engine]
    if: always() && needs.deploy-engine.result == 'success'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
