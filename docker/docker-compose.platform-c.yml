services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: 8gent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: ..
      dockerfile: services/engine/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/8gent
      REDIS_URL: redis://redis:6379
      LLM_GATEWAY_URL: http://llm-gateway:3002
      AGENT_HOST_URL: http://agent-host:3003
      PLATFORM_B_URL: ${PLATFORM_B_URL:-http://host.docker.internal:3010}
      PLATFORM_C_SERVICE_TOKEN: ${PLATFORM_C_SERVICE_TOKEN:-}
      SERVICE_API_KEY: ${SERVICE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  llm-gateway:
    build:
      context: ..
      dockerfile: services/llm-gateway/Dockerfile
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/8gent
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent-host:
    build:
      context: ..
      dockerfile: services/agent-host/Dockerfile
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/8gent
      REDIS_URL: redis://redis:6379
      LLM_GATEWAY_URL: http://llm-gateway:3002
      ENGINE_API_URL: http://engine:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  redis_data:
